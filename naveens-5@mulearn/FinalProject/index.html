<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Scalable App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .container {
            text-align: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
        }

        .box {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #1e293b;
            border-radius: 10px;
            display: inline-block;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1> Scalable Web Application</h1>
        <p>Deployed using Docker and Kubernetes</p>

        <div class="box">
            <strong>Status:</strong> 3 Pods Running
        </div>

        <div class="footer">
            Built by Naveen
        </div>
    </div>
</body>
</html>
